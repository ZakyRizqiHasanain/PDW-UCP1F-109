<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community - Pendaftaran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="./index.html">Home</a>
        <a href="./form.html">Pendaftaran</a>
        <a href="./gallery.html">Multimedia</a>
    </nav>

    <div class="container">
        <h2>Form Pendaftaran Anggota</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label>Nama:</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Bidang Minat:</label>
                <select id="interest">
                    <option value="Web Development">Web Development</option>
                    <option value="Cyber Security">Cyber Security</option>
                    <option value="Data Science">Data Science</option>
                </select>
            </div>
            <button type="submit">Daftar</button>
        </form>

        <div id="resultArea" style="margin-top: 20px; padding: 10px; border-top: 2px solid #2c3e50; display: none;">
            <h4>Hasil Input Terakhir:</h4>
            <p id="displayText"></p>
        </div>
        
        <br>
        <button type=""href="./index.html">Kembali ke Beranda</button>
    </div>
</body>
</html>
